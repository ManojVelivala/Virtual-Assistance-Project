<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John,Virtual Assistant</title>
    <link rel="shortcut icon" href="logo.webp" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="card">
        <header class="card-head">
            <img src="logo.webp" alt="logo" id="logo">
            <div class="title">
                <h1>I'm <span id="name">John</span></h1>
                <p class="subtitle">Your <span id="va">Virtual Assistant</span></p>
            </div>
        </header>

        <section class="visual">
            <img src="voice.avif" alt="voice waveform" id="voice">
        </section>

        <section class="controls">
            <button id="btn" aria-label="Start voice input"><img src="mic.svg" alt="mic icon"><span id="content">Click to speak</span></button>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
